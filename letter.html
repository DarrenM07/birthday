<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For Denaya | Letter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Great+Vibes&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="page scrapbook-page page-letter-new" data-page="letter">
    <main class="scrapbook-stage letter-stage animated-letter-stage">
      <article class="letter-paper animated-letter-paper">
        <p
          id="letterTypewriter"
          class="letter-typewriting"
          data-text="Happy birthday! Wishing you a day filled with laughter, good vibes, and all the little things that make you genuinely happy. You deserve to feel appreciated and celebrated, not just today, but every day. May this year bring you new opportunities, fun adventures, and moments you will always look back on with a smile. As you start another chapter, I hope you continue growing into the person you want to be, while staying true to who you are. Keep chasing your goals, making memories, and surrounding yourself with people who bring out the best in you. Here is to a year ahead that is even better than the last. Happy Birthday again!"
        ></p>
      </article>

      <aside class="photo-strip letter-photo-strip" aria-label="More memories">
        <img src="photo/photo5.jpg" alt="Memory strip 1" />
        <img src="photo/photo6.jpg" alt="Memory strip 2" />
        <img src="photo/photo7.jpg" alt="Memory strip 3" />
        <img src="photo/photo8.jpg" alt="Memory strip 4" />
      </aside>

      <div class="letter-floating-hearts" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <span class="line-doodle gift-doodle" aria-hidden="true"></span>
      <span class="line-doodle balloon-doodle" aria-hidden="true"></span>

      <a class="click-here" href="birthday.html" data-flow-link>Click here</a>
    </main>

    <script src="js/main.js" defer></script>
  </body>
</html>
