<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For Denaya | Cake</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Great+Vibes&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="page scrapbook-page page-cake" data-page="cake">
    <main class="scrapbook-stage cake-stage">
      <aside class="photo-strip cake-strip cake-strip-left" aria-label="Left photo strip">
        <img src="photo/photo2.jpg" alt="Memory strip 1" />
        <img src="photo/photo3.jpg" alt="Memory strip 2" />
      </aside>

      <section class="gingham-scene" aria-label="Cake and memories">
        <div class="picnic-sky" aria-hidden="true">
          <span class="picnic-sun"></span>
          <span class="picnic-cloud cloud-one"></span>
          <span class="picnic-cloud cloud-two"></span>
          <span class="picnic-leaf leaf-one"></span>
          <span class="picnic-leaf leaf-two"></span>
          <span class="picnic-leaf leaf-three"></span>
          <span class="picnic-leaf leaf-four"></span>
        </div>
        <span class="gingham-cloth" aria-hidden="true"></span>
        <div class="picnic-basket" aria-hidden="true">
          <span class="basket-handle"></span>
          <span class="basket-cloth"></span>
          <span class="basket-body"></span>
        </div>
        <div class="picnic-foods" aria-hidden="true">
          <span class="salmon-nigiri nigiri-one"></span>
          <span class="salmon-nigiri nigiri-two"></span>
          <span class="salmon-nigiri nigiri-three"></span>
          <span class="salmon-nigiri nigiri-four"></span>
          <span class="maki-roll maki-one"></span>
          <span class="maki-roll maki-two"></span>
        </div>
        <div class="picnic-bouquets" aria-hidden="true">
          <div class="favorite-bouquet picnic-bouquet">
            <span class="flower-stem lily-stem"></span>
            <span class="flower-stem rose-stem"></span>
            <span class="flower-stem breath-stem-one"></span>
            <span class="flower-stem breath-stem-two"></span>

            <span class="pink-lily lily-main">
              <span class="lily-petal p1"></span>
              <span class="lily-petal p2"></span>
              <span class="lily-petal p3"></span>
              <span class="lily-petal p4"></span>
              <span class="lily-petal p5"></span>
              <span class="lily-center"></span>
            </span>

            <span class="rose-bloom rose-main">
              <span></span>
            </span>

            <span class="baby-breath breath-one"></span>
            <span class="baby-breath breath-two"></span>
            <span class="baby-breath breath-three"></span>

            <span class="bouquet-wrap favorite-wrap"></span>
            <span class="bouquet-ribbon favorite-ribbon"></span>
          </div>
        </div>
        <div class="picnic-featured-products" aria-hidden="true">
          <img class="picnic-product teazzi-drink" src="photo/teazzi.png" alt="" />
          <img class="picnic-product dubai-cookie" src="photo/dubai.png" alt="" />
        </div>
        <div class="walking-poodle" aria-hidden="true">
          <span class="poodle-tail"></span>
          <span class="poodle-body"></span>
          <span class="poodle-fur body-curls"></span>
          <span class="poodle-fur chest-curls"></span>
          <span class="poodle-head"></span>
          <span class="poodle-fur head-curls"></span>
          <span class="poodle-face"></span>
          <span class="poodle-muzzle"></span>
          <span class="poodle-ear"></span>
          <span class="poodle-leg leg-one"></span>
          <span class="poodle-leg leg-two"></span>
          <span class="poodle-leg leg-three"></span>
          <span class="poodle-leg leg-four"></span>
          <span class="poodle-fur leg-curls"></span>
        </div>
        <div class="scrapbook-cake" aria-hidden="true">
          <span class="cake-sparkle sparkle-one"></span>
          <span class="cake-sparkle sparkle-two"></span>
          <span class="cake-sparkle sparkle-three"></span>
          <div class="party-candles">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="cake-frosting"></div>
          <div class="cake-tier top-tier"></div>
          <div class="cake-tier bottom-tier"></div>
          <div class="cake-stand"></div>
        </div>
        <figure class="big-round-photo">
          <img src="photo/photo1.jpg" alt="Favorite memory" />
        </figure>
        <figure class="taped-photo cake-photo">
          <img src="photo/photo9.jpg" alt="Birthday memory" />
        </figure>
        <figure class="retro-camera">
          <img src="photo/photo10.jpg" alt="Small memory" />
        </figure>
        <a
          class="vinyl-small cd-nav"
          href="surprise.html"
          data-flow-link
          data-transition="cd"
          aria-label="Open the song"
        >
          <span>Click here</span>
        </a>
      </section>

      <aside class="photo-strip cake-strip cake-strip-right" aria-label="Right photo strip">
        <img src="photo/photo4.jpg" alt="Memory strip 3" />
        <img src="photo/photo5.jpg" alt="Memory strip 4" />
      </aside>

      <a class="corner-link" href="birthday.html" data-flow-link>Back</a>
    </main>

    <script src="js/main.js" defer></script>
  </body>
</html>
