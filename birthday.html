<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For Denaya | Gifts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Great+Vibes&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="page scrapbook-page page-gifts" data-page="gifts">
    <main class="scrapbook-stage menu-stage">
      <h1 class="script-title">These are for you</h1>

      <section class="gift-choice-grid" aria-label="Birthday gifts">
        <a class="gift-choice" href="moments.html" data-flow-link data-transition="gift-message">
          <span class="gift-icon envelope-icon" aria-hidden="true">
            <span class="envelope-seal"></span>
          </span>
          <span class="gift-label">Message</span>
        </a>

        <a class="gift-choice" href="reasons.html" data-flow-link data-transition="gift-flower">
          <span class="gift-icon bouquet-icon" aria-hidden="true">
            <span class="small-flower flower-one"></span>
            <span class="small-flower flower-two"></span>
            <span class="small-flower flower-three"></span>
          </span>
          <span class="gift-label">Flower</span>
        </a>

        <a class="gift-choice" href="future.html" data-flow-link data-transition="gift-cake">
          <span class="gift-icon cake-icon" aria-hidden="true">
            <span class="cake-berry"></span>
          </span>
          <span class="gift-label">Cake</span>
        </a>

        <a class="gift-choice" href="memories.html" data-flow-link data-transition="gift-photos">
          <span class="gift-icon photos-icon" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </span>
          <span class="gift-label">Photos</span>
        </a>
      </section>
    </main>

    <script src="js/main.js" defer></script>
  </body>
</html>
