<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For Denaya | Open</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Great+Vibes&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="page prelude-page seal-page" data-page="index">
    <main class="prelude-card">
      <h1 class="prelude-title">Happy Birthday!</h1>

      <a
        class="seal-envelope"
        href="countdown.html"
        data-flow-link
        data-transition="card"
        aria-label="Click the seal to open"
      >
        <span class="card-inside" aria-hidden="true">
          <span>For Denaya</span>
          <small>a little birthday surprise</small>
        </span>
        <span class="seal-flap" aria-hidden="true"></span>
        <span class="wax-seal" aria-hidden="true">D</span>
      </a>

      <p class="seal-hint">Click the seal to open</p>

      <span class="line-doodle gift-doodle prelude-gift" aria-hidden="true"></span>
      <span class="line-doodle balloon-doodle prelude-balloons" aria-hidden="true"></span>
    </main>

    <script src="js/main.js" defer></script>
  </body>
</html>
