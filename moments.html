<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For Denaya | Message</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Great+Vibes&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="page scrapbook-page page-message" data-page="message">
    <main class="scrapbook-stage message-stage">
      <div class="message-sparkles" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>

      <section class="message-envelope" aria-label="Message preview">
        <a class="lace-paper" href="letter.html" data-flow-link>
          <span class="view-label">Click to view</span>
          <span class="paper-lines">
            Happy birthday! Wishing you a day filled with laughter, good vibes,
            and all the little things that make you genuinely happy.
          </span>
        </a>
        <span class="open-envelope" aria-hidden="true"></span>
      </section>

      <section class="floating-photos" aria-label="Photo memories">
        <figure class="mini-polaroid tilt-left">
          <img src="photo/photo1.jpg" alt="Denaya memory 1" />
        </figure>
        <figure class="mini-polaroid tilt-right">
          <img src="photo/photo2.jpg" alt="Denaya memory 2" />
        </figure>
        <figure class="mini-polaroid tilt-soft">
          <img src="photo/photo3.jpg" alt="Denaya memory 3" />
        </figure>
        <figure class="mini-polaroid tilt-back">
          <img src="photo/photo4.jpg" alt="Denaya memory 4" />
        </figure>
      </section>

      <span class="cute-heart heart-message-one" aria-hidden="true"></span>
      <span class="cute-heart heart-message-two" aria-hidden="true"></span>
      <a class="click-here" href="letter.html" data-flow-link>Click here</a>
      <a class="corner-link" href="birthday.html" data-flow-link>Back</a>
    </main>

    <script src="js/main.js" defer></script>
  </body>
</html>
